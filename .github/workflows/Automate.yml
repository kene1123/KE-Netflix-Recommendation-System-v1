name: Recommendation Pipeline

on:
  # Daily collab + hybrid refresh — independent of clean_and_sync
  schedule:
    - cron: "0 3 * * 2-6"    # Tue-Sat 03:00 UTC

  # Weekly full recompute — triggers only AFTER clean_and_sync succeeds,
  # removing reliance on a fixed time gap between the two workflows
  workflow_run:
    workflows: ["Clean & TMDB Sync"]
    types: [completed]

  workflow_dispatch:
    inputs:
      run_type:
        description: "Run type"
        required: true
        default: daily
        type: choice
        options:
          - daily       # collab + hybrid only
          - weekly      # content + collab + hybrid
      events_per_user:
        description: "New events per active user"
        required: false
        default: "10"

jobs:
  automate:
    name: Recommendation Refresh
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Skip entirely if triggered by a failed clean_and_sync run
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve run flags
        id: flags
        run: |
          EVENT="${{ github.event_name }}"
          MODE="${{ github.event.inputs.run_type || 'daily' }}"
          EVENTS="${{ github.event.inputs.events_per_user || '10' }}"

          # workflow_run (triggered after clean_and_sync) always does a full weekly recompute
          if [ "$EVENT" = "workflow_run" ] || [ "$MODE" = "weekly" ]; then
            FLAGS="--full --run-type weekly --events-per-user $EVENTS"
          else
            FLAGS="--run-type daily --events-per-user $EVENTS"
          fi

          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "Trigger: $EVENT  |  Running: python -m pipelines.automate $FLAGS"

      - name: Run automation pipeline
        env:
          DB_HOST:      ${{ secrets.DB_HOST }}
          DB_PORT:      ${{ secrets.DB_PORT }}
          DB_NAME:      ${{ secrets.DB_NAME }}
          DB_USER:      ${{ secrets.DB_USER }}
          DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python -m pipelines.automate ${{ steps.flags.outputs.flags }}

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automate-log-${{ github.run_id }}
          path: logs/automate.log
          retention-days: 30